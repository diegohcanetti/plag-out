name: Plag-out CI Pipeline

on:
  pull_request:
    branches:
      - main
      - develop
  push:
    branches:
      - main
      - develop

jobs:
  test-and-lint:
    runs-on: ubuntu-latest

    services:
      # Spin up PostGIS database for unit tests execution
      postgres:
        image: postgis/postgis:15-3.3
        env:
          POSTGRES_DB: plagout_db
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: password123
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libpq-dev geos-bin libgeos-dev

      - name: Install Python Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install flake8 black

      - name: Run Syntax & Linter Checks
        run: |
          # Check style formatting but do not block the pipeline for style-only warnings
          flake8 --max-line-length=120 --exclude=venv,.venv,__pycache__,build,dist . || true
          black --check --line-length=120 . || true

      - name: Run pytest Unit Tests
        env:
          DATABASE_URL: postgresql://postgres:password123@localhost:5432/plagout_db
          PLAGOUT_API_KEY: plagout_secret_token_123
          NASA_POWER_API_KEY: mock_key
        run: |
          PYTHONPATH=. pytest tests/
