name: Plag-out Nightly Pipeline

on:
  schedule:
    # Run every night at 2:00 AM UTC
    - cron: '0 2 * * *'
  workflow_dispatch:
    # Allow manual triggering from the GitHub UI

jobs:
  run-pipeline:
    runs-on: ubuntu-latest

    services:
      # Spin up PostGIS database for the execution
      postgres:
        image: postgis/postgis:15-3.3
        env:
          POSTGRES_DB: plagout_db
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: password123
        ports:
          - 5432:5432
        # Wait for postgres to be healthy before starting
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libpq-dev geos-bin libgeos-dev

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Unit Tests
        env:
          DATABASE_URL: postgresql://postgres:password123@localhost:5432/plagout_db
          PLAGOUT_API_KEY: ${{ secrets.PLAGOUT_API_KEY }}
          NASA_POWER_API_KEY: ${{ secrets.NASA_POWER_API_KEY }}
        run: |
          PYTHONPATH=. pytest tests/

      - name: Execute ETL Pipeline
        env:
          DATABASE_URL: postgresql://postgres:password123@localhost:5432/plagout_db
          PLAGOUT_API_KEY: ${{ secrets.PLAGOUT_API_KEY }}
          NASA_POWER_API_KEY: ${{ secrets.NASA_POWER_API_KEY }}
        run: |
          PYTHONPATH=. python orchestrator.py

      - name: Execute ML Pipeline
        env:
          DATABASE_URL: postgresql://postgres:password123@localhost:5432/plagout_db
          PLAGOUT_API_KEY: ${{ secrets.PLAGOUT_API_KEY }}
          NASA_POWER_API_KEY: ${{ secrets.NASA_POWER_API_KEY }}
        run: |
          PYTHONPATH=. python ml/run_ml_pipeline.py
